!
hostname spine-02
!
enable password admin
!
username admin privilege 15 secret admin
!
interface Management1
   ip address 172.20.0.12/24
!
ip routing
!
interface Eth1
   no switchport
   ip address 10.0.3.0/31
!
interface Eth2
   no switchport
   ip address 10.0.4.0/31
!
router bgp 65000
   router-id 10.0.0.12
   maximum-paths 2
   neighbor 10.0.3.1 remote-as 65001
   neighbor 10.0.4.1 remote-as 65002
!
management api http-commands
   protocol http
   no shutdown
!
